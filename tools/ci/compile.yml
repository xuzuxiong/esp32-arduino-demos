# Copy to .github/workflows/compile.yml to enable GitHub Actions CI
# (requires git push with `workflow` OAuth scope)

name: Compile Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-decq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install arduinoFFT
          arduino-cli lib install "U8g2"
          arduino-cli lib install PubSubClient
          arduino-cli lib install WiFiManager
          arduino-cli lib install ArduinoJson
          arduino-cli lib install CRC32

      - name: Compile DECQ firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:PartitionScheme=app3M_fat9M_16MB,CPUFreq=240,FlashMode=qio,FlashFreq=80,FlashSize=16M \
            firmware/DECQ

  compile-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core and libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install arduinoFFT

      - name: Compile I2S example
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 examples/i2s_energy_detect

      - name: Compile CH9329 example
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 examples/ch9329_mouse
