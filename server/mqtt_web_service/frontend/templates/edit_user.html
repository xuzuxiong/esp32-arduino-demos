{% extends "base.html" %}

{% block title %}编辑用户 - {{ user.phone }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>编辑用户信息</h2>

    <!-- 显示表单，用于编辑用户信息 -->
    <form method="POST">
        <div class="mb-3">
            <label for="phone" class="form-label">手机号码</label>
            <input type="text" class="form-control" id="phone" name="phone" value="{{ user.phone }}" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">新密码</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="请输入新密码" required>
        </div>
        <button type="submit" class="btn btn-primary">提交修改</button>
        <a href="{{ url_for('main.admin_dashboard') }}" class="btn btn-secondary ms-2">返回管理面板</a>
    </form>
</div>
{% endblock %}
