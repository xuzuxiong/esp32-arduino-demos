{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center">找回密码</h2>
    <form method="POST" action="{{ url_for('main.reset_password') }}">
        <div class="form-group">
            <label for="phone">手机号码</label>
            <input type="text" class="form-control" id="phone" name="phone" placeholder="请输入手机号码" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">下一步</button>
    </form>
    {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
    <a href="{{ url_for('main.login') }}" class="d-block mt-3">返回登录</a>
</div>
{% endblock %}
