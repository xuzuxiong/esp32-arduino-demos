{% extends "base.html" %}

{% block title %}用户注册{% endblock %}

{% block content %}
<h2 class="text-center">用户注册</h2>
<form method="POST">
    <div class="mb-3">
        <label for="phone" class="form-label">手机号码</label>
        <input type="text" class="form-control" id="phone" name="phone" required>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">密码</label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <div class="mb-3">
        <label for="confirm_password" class="form-label">确认密码</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
    </div>
    <div class="mb-3">
        <label for="security_question" class="form-label">密保问题</label>
        <select class="form-select" id="security_question" name="security_question" required>
            <option value="小学班主任的名字">小学班主任的名字</option>
            <option value="母亲的名字">母亲的名字</option>
            <option value="最喜欢的宠物的名字">最喜欢的宠物的名字</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="security_answer" class="form-label">密保答案</label>
        <input type="text" class="form-control" id="security_answer" name="security_answer" required>
    </div>
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <button type="submit" class="btn btn-primary w-100">注册</button>
</form>
<div class="text-center mt-3">
    <a href="{{ url_for('main.login') }}">返回登录</a>
</div>
{% endblock %}
