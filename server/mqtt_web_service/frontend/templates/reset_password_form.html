{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center">重置密码</h2>
    <form method="POST" action="{{ url_for('main.reset_password_form') }}">
        <input type="hidden" name="phone" value="{{ phone }}">
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" class="form-control" id="new_password" name="new_password" placeholder="请输入新密码" required>
        </div>
        <div class="form-group mt-3">
            <label for="confirm_password">确认密码</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required>
        </div>
        <button type="submit" class="btn btn-success mt-3">重置密码</button>
    </form>
    {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
    <a href="{{ url_for('main.login') }}" class="d-block mt-3">返回登录</a>
</div>
{% endblock %}
