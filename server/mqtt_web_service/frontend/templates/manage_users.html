{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>用户管理</h2>

    <div class="mb-3">
        <a href="{{ url_for('create_user') }}" class="btn btn-success">添加新用户</a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>用户手机号</th>
                <th>角色</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.phone }}</td>
                <td>{{ '管理员' if user.is_admin else '普通用户' }}</td>
                <td>
                    <a href="{{ url_for('edit_user', user_id=user.id) }}" class="btn btn-primary">编辑</a>
                    <a href="{{ url_for('delete_user', user_id=user.id) }}" class="btn btn-danger">删除</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
