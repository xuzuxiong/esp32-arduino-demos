{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center">找回密码</h2>
    <form method="POST" action="{{ url_for('main.reset_password_answer') }}">
        <input type="hidden" name="phone" value="{{ phone }}">
        <div class="form-group">
            <label for="security_question">密保问题</label>
            <input type="text" class="form-control" id="security_question" value="{{ question }}" readonly>
        </div>
        <div class="form-group mt-3">
            <label for="security_answer">密保答案</label>
            <input type="text" class="form-control" id="security_answer" name="security_answer" placeholder="请输入密保答案" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">验证</button>
    </form>
    {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
    <a href="{{ url_for('main.login') }}" class="d-block mt-3">返回登录</a>
</div>
{% endblock %}
