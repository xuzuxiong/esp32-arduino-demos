<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <style>
        /* 与登录和注册页面相同的样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        form {
            display: inline-block;
            text-align: left;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: #17a2b8;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #138496;
        }

        #status {
            margin-top: 20px;
            color: #17a2b8;
        }

        #status.error {
            color: red;
        }

        #status.success {
            color: green;
        }

        .links {
            margin-top: 15px;
        }

        .links a {
            margin: 0 10px;
            color: #17a2b8;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>忘记密码</h1>
    <form id="forgotPasswordForm">
        <label for="username">手机号：</label>
        <input type="text" id="username" name="username" placeholder="请输入11位手机号码" required>
        <br>
        <div id="securityQuestionContainer" style="display: none;">
            <label for="securityQuestion">安全问题：</label>
            <p id="securityQuestionText"></p>
            <label for="securityAnswer">答案：</label>
            <input type="text" id="securityAnswer" name="security_answer" placeholder="请输入您的答案" required>
            <br>
        </div>
        <div id="resetPasswordContainer" style="display: none;">
            <label for="newPassword">新密码：</label>
            <input type="password" id="newPassword" name="new_password" placeholder="请输入6位及以上密码" required>
            <br>
            <label for="confirmNewPassword">确认新密码：</label>
            <input type="password" id="confirmNewPassword" name="confirm_new_password" placeholder="请再次输入新密码" required>
            <br>
        </div>
        <div style="text-align: center;">
            <button type="submit">下一步</button>
        </div>
    </form>
    <div class="links">
        <a href="/">返回登录</a>
    </div>
    <div id="status"></div>

    <script>
        let currentStage = 1;
        let resetToken = '';

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const securityAnswer = document.getElementById('securityAnswer') ? document.getElementById('securityAnswer').value.trim() : '';
            const newPassword = document.getElementById('newPassword') ? document.getElementById('newPassword').value.trim() : '';
            const confirmNewPassword = document.getElementById('confirmNewPassword') ? document.getElementById('confirmNewPassword').value.trim() : '';

            const statusDiv = document.getElementById('status');

            if (currentStage === 1) {
                // 基本验证
                if (!/^\d{11}$/.test(username)) {
                    alert('请输入有效的11位手机号码！');
                    return;
                }

                // 请求安全问题
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const result = await response.json();

                if (response.ok && result.security_question) {
                    // 显示安全问题
                    document.getElementById('securityQuestionText').textContent = result.security_question;
                    document.getElementById('securityQuestionContainer').style.display = 'block';
                    currentStage = 2;
                    // 改变按钮文本
                    e.target.querySelector('button').textContent = '验证答案';
                } else {
                    statusDiv.textContent = result.message || '如果用户名存在，我们已发送重置链接';
                    statusDiv.className = 'success';
                }
            } else if (currentStage === 2) {
                // 验证安全答案
                if (!securityAnswer) {
                    alert('安全答案不能为空！');
                    return;
                }

                const response = await fetch('/api/verify-security-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, security_answer: securityAnswer })
                });

                const result = await response.json();

                if (response.ok && result.token) {
                    resetToken = result.token;
                    // 显示重置密码字段
                    document.getElementById('resetPasswordContainer').style.display = 'block';
                    currentStage = 3;
                    // 改变按钮文本
                    e.target.querySelector('button').textContent = '重置密码';
                } else {
                    statusDiv.textContent = result.error || '验证失败，请检查您的输入';
                    statusDiv.className = 'error';
                }
            } else if (currentStage === 3) {
                // 重置密码
                if (newPassword.length < 6) {
                    alert('密码必须大于6位，请重新输入！');
                    return;
                }

                if (newPassword !== confirmNewPassword) {
                    alert('密码与确认密码不一致，请重新输入！');
                    return;
                }

                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: newPassword })
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.textContent = '密码已成功重置，正在登录...';
                    statusDiv.className = 'success';

                    // 自动跳转到登录页面
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    statusDiv.textContent = result.error || '密码重置失败，请稍后再试';
                    statusDiv.className = 'error';
                }
            }
        });
    </script>
</body>
</html>
